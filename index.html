<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="/src/style.css" rel="stylesheet" />
  <title>Olympiad Masters</title>
  <style>
    /* Only loader styles — nothing global that could conflict with style.css */
    #pre-render-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background-color: #ffffff;
      z-index: 9999;
    }

    #pre-render-loader .spinner {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 4px solid #e2e8f0;
      border-top-color: #6366f1;
      animation: pre-spin 0.75s linear infinite;
    }

    #pre-render-loader .label {
      font-size: 14px;
      font-family: system-ui, -apple-system, sans-serif;
      color: #94a3b8;
      font-weight: 500;
    }

    /* Namespaced keyframe so it can't clash with any animation in style.css */
    @keyframes pre-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="pre-render-loader" aria-label="Loading application" role="status">
      <div class="spinner"></div>
      <p class="label">Loading…</p>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
 </body>
</html>
